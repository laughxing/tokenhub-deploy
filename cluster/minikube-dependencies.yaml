apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-minikube-postgres
  labels:
    app.kubernetes.io/name: litellm-minikube-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-minikube-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-minikube-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: litellm
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: litellm-writer-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-writer-secret
                  key: password
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -d
                - litellm
                - -U
                - litellm
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-minikube-postgres
  labels:
    app.kubernetes.io/name: litellm-minikube-postgres
spec:
  selector:
    app.kubernetes.io/name: litellm-minikube-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-minikube-redis
  labels:
    app.kubernetes.io/name: litellm-minikube-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-minikube-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-minikube-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-minikube-redis
  labels:
    app.kubernetes.io/name: litellm-minikube-redis
spec:
  selector:
    app.kubernetes.io/name: litellm-minikube-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-minikube-fake-provider
  labels:
    app.kubernetes.io/name: litellm-minikube-fake-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-minikube-fake-provider
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-minikube-fake-provider
    spec:
      containers:
        - name: fake-provider
          image: litellm-fake-provider:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4010
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-minikube-fake-provider
  labels:
    app.kubernetes.io/name: litellm-minikube-fake-provider
spec:
  selector:
    app.kubernetes.io/name: litellm-minikube-fake-provider
  ports:
    - name: http
      port: 4010
      targetPort: http
