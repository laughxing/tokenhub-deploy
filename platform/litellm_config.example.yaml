model_list:
  - model_name: deepseek-chat
    litellm_params:
      model: openai/fake-deepseek-chat
      api_base: os.environ/FAKE_PROVIDER_API_BASE
      api_key: fake-provider-key

  - model_name: qwen-plus
    litellm_params:
      model: openai/fake-qwen-plus
      api_base: os.environ/FAKE_PROVIDER_API_BASE
      api_key: fake-provider-key

  - model_name: moonshot-v1-8k
    litellm_params:
      model: openai/fake-moonshot-v1-8k
      api_base: os.environ/FAKE_PROVIDER_API_BASE
      api_key: fake-provider-key

  - model_name: glm-4-plus
    litellm_params:
      model: openai/fake-glm-4-plus
      api_base: os.environ/FAKE_PROVIDER_API_BASE
      api_key: fake-provider-key

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  telemetry: false
  num_retries: 2
  request_timeout: 600
