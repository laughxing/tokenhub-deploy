services:
  apisix:
    image: apache/apisix:3.11.0-debian
    depends_on:
      - gateway
      - backend
      - ui
    ports:
      - "9080:9080"
    volumes:
      - ../apisix/config.example.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ../apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro

  gateway:
    build:
      context: ${TOKENHUB_PROXY_ROOT:-../../../dev/tokenhub-proxy}
      dockerfile: gateway/Dockerfile
    depends_on:
      fake-provider:
        condition: service_started
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    expose:
      - "4000"
    environment:
      CONFIG_FILE_PATH: /app/config.yaml
      DATABASE_URL: postgresql://llmproxy:dbpassword9090@db:5432/litellm
      FAKE_PROVIDER_API_BASE: http://fake-provider:4010/v1
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-master-key}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-local-salt-key}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./litellm_config.example.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ${TOKENHUB_PROXY_ROOT:-../../../dev/tokenhub-proxy}
      dockerfile: backend/Dockerfile
    depends_on:
      fake-provider:
        condition: service_started
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    expose:
      - "4001"
    environment:
      CONFIG_FILE_PATH: /app/config.yaml
      DATABASE_URL: postgresql://llmproxy:dbpassword9090@db:5432/litellm
      FAKE_PROVIDER_API_BASE: http://fake-provider:4010/v1
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-master-key}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-local-salt-key}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./litellm_config.example.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4001/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ui:
    build:
      context: ${TOKENHUB_PROXY_ROOT:-../../../dev/tokenhub-proxy}
      dockerfile: ui/Dockerfile
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/healthz >/dev/null
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  fake-provider:
    build:
      context: ${TOKENHUB_E2E_ROOT:-../../../dev/tokenhub-e2e}
      dockerfile: fake_provider/Dockerfile
    expose:
      - "4010"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4010/health')"
      interval: 5s
      timeout: 3s
      retries: 10

  migrations:
    build:
      context: ${TOKENHUB_PROXY_ROOT:-../../../dev/tokenhub-proxy}
      dockerfile: migrations/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://llmproxy:dbpassword9090@db:5432/litellm

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litellm
      POSTGRES_PASSWORD: dbpassword9090
      POSTGRES_USER: llmproxy
    volumes:
      - platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    volumes:
      - platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    profiles: [tracing]
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    expose:
      - "4317"
      - "4318"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    profiles: [tracing]
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    expose:
      - "4317"
      - "14250"

volumes:
  platform_postgres_data:
  platform_redis_data:
