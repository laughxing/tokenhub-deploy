# Shared Helm values for any Kubernetes cluster (no ingress host, no DB/Redis endpoints).
# Combine with local-deps.yaml + a local overlay for dev, or production.yaml for real clusters.

masterKey:
  secretName: litellm-master-key-secret
  secretKey: master-key

tracing:
  enabled: true
  ingress:
    enabled: true
    className: nginx

migrationJob:
  enabled: true
  image:
    repository: litellm-migrations
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  extraEnv:
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key

gateway:
  logLevel: INFO
  numWorkers: 1
  image:
    repository: litellm-gateway
    tag: local
    pullPolicy: IfNotPresent
  config:
    create: true
    proxy_config:
      general_settings:
        master_key: os.environ/LITELLM_MASTER_KEY
        store_model_in_db: true
        proxy_batch_write_at: 60
        database_connection_pool_limit: 10
      router_settings:
        routing_strategy: simple-shuffle
        redis_host: os.environ/REDIS_HOST
        redis_port: os.environ/REDIS_PORT
      litellm_settings:
        request_timeout: 600
        telemetry: false
        drop_params: true
        cache: true
        cache_params:
          type: redis
          host: os.environ/REDIS_HOST
          port: os.environ/REDIS_PORT
  extraEnv:
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key

backend:
  logLevel: INFO
  image:
    repository: litellm-backend
    tag: local
    pullPolicy: IfNotPresent
  extraEnv:
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key

ui:
  image:
    repository: litellm-ui
    tag: local
    pullPolicy: IfNotPresent
