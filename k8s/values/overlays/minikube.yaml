# Minikube-only overlay: dev mode, single-replica sizing, Jaeger ingress host.
# LLM API ingress is disabled by overlays/apisix.yaml; APISIX exposes api.localhost / admin.localhost.

tracing:
  ingress:
    host: trace.localhost

migrationJob:
  extraEnv:
    - name: LITELLM_MODE
      value: DEVELOPMENT
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key

gateway:
  config:
    proxy_config:
      general_settings:
        # Keep V2 revoke acceptance deterministic in the split gateway/backend
        # topology while avoiding a production default change.
        user_api_key_cache_ttl: 5
      litellm_settings:
        # Share virtual-key auth cache through Redis so backend key deletion can
        # invalidate gateway auth state in the split local deployment.
        enable_redis_auth_cache: true
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
  extraEnv:
    - name: LITELLM_MODE
      value: DEVELOPMENT
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key

backend:
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
  extraEnv:
    - name: LITELLM_MODE
      value: DEVELOPMENT
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key

ui:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
