# Production overlay: external PostgreSQL/Redis, HA sizing, TLS ingress, real providers.
# Use with base.yaml via k8s/scripts/install.sh — do not apply local dependency manifests.

ingress:
  enabled: true
  className: nginx
  host: litellm.example.internal
  tls:
    - secretName: litellm-tls
      hosts:
        - litellm.example.internal

tracing:
  ingress:
    host: trace.example.internal

database:
  writer:
    host: postgres-writer.example.internal
    port: 5432
    dbname: litellm
    schema: public
    useIAMAuth: false
    passwordSecret:
      name: litellm-writer-secret
      usernameKey: username
      passwordKey: password
  reader:
    host: postgres-reader.example.internal
    port: 5432
    dbname: litellm
    schema: public
    useIAMAuth: false
    passwordSecret:
      name: litellm-reader-secret
      usernameKey: username
      passwordKey: password

redis:
  cluster: true
  host: redis-cluster.example.internal
  port: 6379
  passwordSecret:
    name: litellm-redis-secret
    passwordKey: password

migrationJob:
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1Gi
  extraEnv:
    - name: LITELLM_MODE
      value: PRODUCTION
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key

gateway:
  logLevel: ERROR
  config:
    proxy_config:
      model_list:
        - model_name: gpt-4o
          litellm_params:
            model: openai/gpt-4o
            api_key: os.environ/OPENAI_API_KEY
      general_settings:
        disable_error_logs: true
        use_redis_transaction_buffer: true
      router_settings:
        redis_password: os.environ/REDIS_PASSWORD
      litellm_settings:
        set_verbose: false
        json_logs: true
        cache_params:
          password: os.environ/REDIS_PASSWORD
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 4Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80
  extraEnv:
    - name: LITELLM_MODE
      value: PRODUCTION
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key
    - name: LITELLM_LICENSE
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: license
          optional: true
  envSecrets:
    - litellm-provider-secrets

backend:
  logLevel: ERROR
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 4Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60
  extraEnv:
    - name: LITELLM_MODE
      value: PRODUCTION
    - name: LITELLM_SALT_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: salt-key
    - name: LITELLM_LICENSE
      valueFrom:
        secretKeyRef:
          name: litellm-runtime-secret
          key: license
          optional: true
  envSecrets:
    - litellm-provider-secrets

ui:
  backendUrl: https://litellm.example.internal
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
