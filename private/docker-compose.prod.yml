services:
  litellm:
    image: "${LITELLM_IMAGE:-litellm-database:local}"
    build:
      context: ${TOKENHUB_PROXY_ROOT:-../../../dev/tokenhub-proxy}
      dockerfile: docker/Dockerfile.database
    restart: unless-stopped
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--num_workers"
      - "${LITELLM_NUM_WORKERS:-1}"
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - "${LITELLM_CONFIG_PATH:-./config.example.yaml}:/app/config.yaml:ro"
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://litellm:replace-me@postgres.example.internal:5432/litellm}"
      DATABASE_URL_READ_REPLICA: "${DATABASE_URL_READ_REPLICA:-}"
      DISABLE_SCHEMA_UPDATE: "${DISABLE_SCHEMA_UPDATE:-true}"
      ENFORCE_PRISMA_MIGRATION_CHECK: "${ENFORCE_PRISMA_MIGRATION_CHECK:-true}"
      LITELLM_LICENSE: "${LITELLM_LICENSE:-}"
      LITELLM_LOG: "${LITELLM_LOG:-ERROR}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-replace-with-a-random-admin-key}"
      LITELLM_MODE: "PRODUCTION"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY:-sk-replace-with-a-random-salt-key}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      AZURE_API_KEY: "${AZURE_API_KEY:-}"
      AZURE_API_BASE: "${AZURE_API_BASE:-}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      STORE_MODEL_IN_DB: "True"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command:
      - "sh"
      - "-c"
      - "if [ -n \"$${REDIS_PASSWORD}\" ]; then exec redis-server --requirepass \"$${REDIS_PASSWORD}\"; else exec redis-server; fi"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles:
      - observability
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"

volumes:
  prometheus_data:
  redis_data:
